<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attigo Logo Options</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'DM Sans', sans-serif;
            background: #f5f7f9;
            padding: 40px;
        }
        h1 {
            text-align: center;
            color: #1a1f26;
            margin-bottom: 40px;
            font-weight: 500;
        }
        .logo-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            max-width: 1200px;
            margin: 0 auto;
        }
        .logo-card {
            background: white;
            border-radius: 12px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
        }
        .logo-card h3 {
            margin-bottom: 30px;
            color: #6b7280;
            font-size: 14px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }
        .logo-container {
            margin-bottom: 20px;
        }
        .logo-dark {
            background: #2E4A62;
            padding: 30px;
            border-radius: 8px;
            margin-top: 20px;
        }
        svg { max-width: 100%; height: auto; }
    </style>
</head>
<body>
    <h1>Attigo Logo Options</h1>
    
    <div class="logo-grid">
        <!-- Option 1: Clean Mountain Peak -->
        <div class="logo-card">
            <h3>Option 1 - Mountain Peak</h3>
            <div class="logo-container">
                <svg width="200" height="60" viewBox="0 0 200 60" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <!-- Mountain icon -->
                    <path d="M10 45 L25 15 L32 28 L40 12 L55 45 Z" fill="#2E4A62"/>
                    <path d="M25 15 L32 28 L40 12 L32 22 Z" fill="#7BA3C4"/>
                    <!-- Text -->
                    <text x="65" y="38" font-family="DM Sans, sans-serif" font-size="28" font-weight="500" fill="#1A1F26" letter-spacing="3">ATTIGO</text>
                </svg>
            </div>
            <div class="logo-dark">
                <svg width="200" height="60" viewBox="0 0 200 60" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M10 45 L25 15 L32 28 L40 12 L55 45 Z" fill="#ffffff"/>
                    <path d="M25 15 L32 28 L40 12 L32 22 Z" fill="#7BA3C4"/>
                    <text x="65" y="38" font-family="DM Sans, sans-serif" font-size="28" font-weight="500" fill="#ffffff" letter-spacing="3">ATTIGO</text>
                </svg>
            </div>
        </div>

        <!-- Option 2: Geometric A Mountain -->
        <div class="logo-card">
            <h3>Option 2 - Geometric A</h3>
            <div class="logo-container">
                <svg width="200" height="60" viewBox="0 0 200 60" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <!-- Stylized A as mountain -->
                    <path d="M15 48 L32.5 8 L50 48 L40 48 L32.5 28 L25 48 Z" fill="#2E4A62"/>
                    <path d="M25 38 L32.5 22 L40 38 Z" fill="#7BA3C4"/>
                    <!-- Text -->
                    <text x="58" y="38" font-family="DM Sans, sans-serif" font-size="26" font-weight="500" fill="#1A1F26" letter-spacing="2">TTIGO</text>
                </svg>
            </div>
            <div class="logo-dark">
                <svg width="200" height="60" viewBox="0 0 200 60" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M15 48 L32.5 8 L50 48 L40 48 L32.5 28 L25 48 Z" fill="#ffffff"/>
                    <path d="M25 38 L32.5 22 L40 38 Z" fill="#7BA3C4"/>
                    <text x="58" y="38" font-family="DM Sans, sans-serif" font-size="26" font-weight="500" fill="#ffffff" letter-spacing="2">TTIGO</text>
                </svg>
            </div>
        </div>

        <!-- Option 3: Twin Peaks -->
        <div class="logo-card">
            <h3>Option 3 - Twin Peaks</h3>
            <div class="logo-container">
                <svg width="220" height="60" viewBox="0 0 220 60" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <!-- Twin mountains -->
                    <path d="M8 46 L22 18 L36 46 Z" fill="#2E4A62"/>
                    <path d="M28 46 L45 10 L62 46 Z" fill="#3D5F7A"/>
                    <path d="M45 10 L52 24 L45 20 Z" fill="#7BA3C4"/>
                    <!-- Text -->
                    <text x="72" y="38" font-family="DM Sans, sans-serif" font-size="28" font-weight="500" fill="#1A1F26" letter-spacing="3">ATTIGO</text>
                </svg>
            </div>
            <div class="logo-dark">
                <svg width="220" height="60" viewBox="0 0 220 60" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M8 46 L22 18 L36 46 Z" fill="rgba(255,255,255,0.7)"/>
                    <path d="M28 46 L45 10 L62 46 Z" fill="#ffffff"/>
                    <path d="M45 10 L52 24 L45 20 Z" fill="#7BA3C4"/>
                    <text x="72" y="38" font-family="DM Sans, sans-serif" font-size="28" font-weight="500" fill="#ffffff" letter-spacing="3">ATTIGO</text>
                </svg>
            </div>
        </div>

        <!-- Option 4: Minimal Line Peak -->
        <div class="logo-card">
            <h3>Option 4 - Minimal Line</h3>
            <div class="logo-container">
                <svg width="200" height="60" viewBox="0 0 200 60" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <!-- Simple line mountain -->
                    <path d="M12 44 L28 16 L44 44" stroke="#2E4A62" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
                    <path d="M22 32 L28 22 L34 32" stroke="#7BA3C4" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
                    <!-- Text -->
                    <text x="55" y="38" font-family="DM Sans, sans-serif" font-size="28" font-weight="400" fill="#1A1F26" letter-spacing="4">ATTIGO</text>
                </svg>
            </div>
            <div class="logo-dark">
                <svg width="200" height="60" viewBox="0 0 200 60" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 44 L28 16 L44 44" stroke="#ffffff" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
                    <path d="M22 32 L28 22 L34 32" stroke="#7BA3C4" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
                    <text x="55" y="38" font-family="DM Sans, sans-serif" font-size="28" font-weight="400" fill="#ffffff" letter-spacing="4">ATTIGO</text>
                </svg>
            </div>
        </div>

        <!-- Option 5: Shield Mountain -->
        <div class="logo-card">
            <h3>Option 5 - Shield Peak</h3>
            <div class="logo-container">
                <svg width="200" height="60" viewBox="0 0 200 60" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <!-- Shield with mountain inside -->
                    <path d="M30 6 C30 6 10 10 10 10 L10 32 C10 42 30 54 30 54 C30 54 50 42 50 32 L50 10 C50 10 30 6 30 6 Z" fill="none" stroke="#2E4A62" stroke-width="2"/>
                    <path d="M18 38 L30 18 L42 38 Z" fill="#2E4A62"/>
                    <path d="M30 18 L36 30 L30 26 Z" fill="#7BA3C4"/>
                    <!-- Text -->
                    <text x="60" y="38" font-family="DM Sans, sans-serif" font-size="26" font-weight="500" fill="#1A1F26" letter-spacing="2">ATTIGO</text>
                </svg>
            </div>
            <div class="logo-dark">
                <svg width="200" height="60" viewBox="0 0 200 60" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M30 6 C30 6 10 10 10 10 L10 32 C10 42 30 54 30 54 C30 54 50 42 50 32 L50 10 C50 10 30 6 30 6 Z" fill="none" stroke="#ffffff" stroke-width="2"/>
                    <path d="M18 38 L30 18 L42 38 Z" fill="#ffffff"/>
                    <path d="M30 18 L36 30 L30 26 Z" fill="#7BA3C4"/>
                    <text x="60" y="38" font-family="DM Sans, sans-serif" font-size="26" font-weight="500" fill="#ffffff" letter-spacing="2">ATTIGO</text>
                </svg>
            </div>
        </div>

        <!-- Option 6: Simple Caret Peak -->
        <div class="logo-card">
            <h3>Option 6 - Simple Caret</h3>
            <div class="logo-container">
                <svg width="200" height="60" viewBox="0 0 200 60" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <!-- Simple caret/chevron -->
                    <path d="M28 42 L28 14 L48 42 Z" fill="#2E4A62"/>
                    <path d="M28 14 L38 28 L28 24 Z" fill="#7BA3C4"/>
                    <!-- Text -->
                    <text x="58" y="38" font-family="DM Sans, sans-serif" font-size="28" font-weight="500" fill="#1A1F26" letter-spacing="3">ATTIGO</text>
                </svg>
            </div>
            <div class="logo-dark">
                <svg width="200" height="60" viewBox="0 0 200 60" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M28 42 L28 14 L48 42 Z" fill="#ffffff"/>
                    <path d="M28 14 L38 28 L28 24 Z" fill="#7BA3C4"/>
                    <text x="58" y="38" font-family="DM Sans, sans-serif" font-size="28" font-weight="500" fill="#ffffff" letter-spacing="3">ATTIGO</text>
                </svg>
            </div>
        </div>
    </div>
</body>
</html>
